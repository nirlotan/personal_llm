<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PersonaChat Landing Page</title>
    <style>
        /* CSS RESET & BASE STYLES */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #1d1d1f;
        }

        .container {
            text-align: center;
            width: 100%;
            max-width: 1100px;
            padding: 40px 20px;
        }

        /* HEADER */
        .main-title {
            font-size: 3rem;
            margin-bottom: 50px;
            font-weight: 500;
            letter-spacing: -0.5px;
        }

        /* CARD GRID */
        .card-grid {
            display: flex;
            gap: 24px;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 50px;
        }

        /* CARD COMPONENT */
        .card {
            background: #fff;
            width: 220px;
            height: 240px;
            padding: 30px 20px;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.04);
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            cursor: pointer;
            border: 1px solid rgba(0,0,0,0.03);
        }

        .card:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.08);
        }

        /* CARD EMOJIS & TEXT */
        .emoji {
            font-size: 2.8rem;
            margin-bottom: 20px;
            display: block;
        }

        .card h3 {
            font-size: 1.15rem;
            margin-bottom: 12px;
            font-weight: 600;
            line-height: 1.2;
        }

        .card p {
            font-size: 0.95rem;
            color: #6e6e73;
            line-height: 1.4;
            font-weight: 400;
        }

        /* SPECIFIC CARD THEMES (Gradients) */
        .vanilla { 
            background: linear-gradient(180deg, #e1f0ff 0%, #ffffff 60%); 
        }
        .personalized-me { 
            background: linear-gradient(180deg, #e4f5e9 0%, #ffffff 60%); 
        }
        .personalized-random { 
            background: linear-gradient(180deg, #f1e6f7 0%, #ffffff 60%); 
        }
        .persona-ref { 
            background: linear-gradient(180deg, #fff2e0 0%, #ffffff 60%); 
        }

        /* CTA BUTTON */
        .get-started-btn {
            background-color: #3d9d61;
            color: white;
            border: none;
            padding: 18px 100px;
            font-size: 1.2rem;
            font-weight: 500;
            border-radius: 12px;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .get-started-btn:hover {
            background-color: #348a54;
        }

        /* RESPONSIVE ADJUSTMENTS */
        @media (max-width: 768px) {
            .card-grid {
                flex-direction: column;
                align-items: center;
            }
            .card {
                width: 100%;
                max-width: 320px;
            }
            .get-started-btn {
                width: 100%;
                padding: 18px 0;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1 class="main-title">Welcome to PersonaChat</h1>

        <div class="card-grid">
            <div class="card vanilla">
                <span class="emoji">🤖</span>
                <h3>Vanilla</h3>
                <p>Experience standard AI assistance.</p>
            </div>

            <div class="card personalized-me">
                <span class="emoji">🪞</span>
                <h3>Personalized Like Me</h3>
                <p>Chat that mirrors your style.</p>
            </div>

            <div class="card personalized-random">
                <span class="emoji">🎲</span>
                <h3>Personalized Random</h3>
                <p>Unexpected, varied responses.</p>
            </div>

            <div class="card persona-ref">
                <span class="emoji">🎭</span>
                <h3>PERSONA_ref</h3>
                <p>Adopt a specific persona.</p>
            </div>
        </div>

        <button class="get-started-btn">Get Started</button>
    </div>

</body>
</html>

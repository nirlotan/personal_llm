# Docker Compose – runs both backend and frontend for local development.
services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - HTTP_PROXY=http://proxy-chain.intel.com:911
      - HTTPS_PROXY=http://proxy-chain.intel.com:911
      - NO_PROXY=localhost,127.0.0.1,frontend
    volumes:
      - ./backend/app:/app/app  # hot reload
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000
      - HTTP_PROXY=http://proxy-chain.intel.com:911
      - HTTPS_PROXY=http://proxy-chain.intel.com:911
      - NO_PROXY=localhost,127.0.0.1,backend
    depends_on:
      backend:
        condition: service_healthy
